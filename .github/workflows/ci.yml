name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Start Redis and Postgres
        run: docker compose up -d redis postgres
      - name: Build
        run: mkdir -p bin && go build -o ./bin/bansho ./cmd/bansho
      - name: Test
        run: go test ./...
